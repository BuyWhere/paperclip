name: Auth Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/app/api/auth/**'
      - 'src/app/api/user/**'
      - 'src/lib/auth/**'
      - 'src/lib/redis/**'
      - 'src/lib/db/**'
      - 'src/__tests__/auth/**'
      - 'prisma/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/api/auth/**'
      - 'src/app/api/user/**'
      - 'src/lib/auth/**'
      - 'src/lib/redis/**'
      - 'src/lib/db/**'
      - 'src/__tests__/auth/**'
      - 'prisma/**'

jobs:
  unit-and-route-integration:
    name: Unit + Route-level integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate RSA test keypair
        id: keygen
        run: |
          openssl genrsa -out /tmp/test_private.pem 2048
          openssl rsa -in /tmp/test_private.pem -pubout -out /tmp/test_public.pem
          echo "JWT_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/test_private.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/test_public.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run all tests (unit + route integration)
        run: npm test -- --coverage --coverageDirectory=coverage/unit
        env:
          NODE_ENV: test
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit

  full-integration:
    name: Full integration tests (live Postgres + Redis)
    runs-on: ubuntu-latest
    # Requires Railway tokens — skipped when secrets not available
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_FULL_INTEGRATION == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate RSA test keypair
        run: |
          openssl genrsa -out /tmp/test_private.pem 2048
          openssl rsa -in /tmp/test_private.pem -pubout -out /tmp/test_public.pem
          echo "JWT_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/test_private.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/test_public.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run Prisma migrations on test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/testdb
          DIRECT_URL: postgresql://test:test@localhost:5433/testdb

      - name: Run tests against live stack
        run: npm test -- --testPathPattern='__tests__/auth' --coverage --coverageDirectory=coverage/integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/testdb
          DIRECT_URL: postgresql://test:test@localhost:5433/testdb
          REDIS_URL: redis://localhost:6380
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage/integration
